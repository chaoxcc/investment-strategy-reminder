name: Run Investment Strategy

on:
  schedule:
    # 每日加仓监控：周一至周五 14:00（UTC 时间，对应北京时间 22:00）
    - cron: '0 14 * * 1-5'
    # 每周赎回检查：周日 20:00（UTC 时间，对应北京时间 04:00 下周一）
    - cron: '0 20 * * 0'
  # 允许手动触发
  workflow_dispatch:
    inputs:
      simulate:
        description: '模拟触发模式（可选：a_add, a_sell, us_sell, us_backfill_1, us_backfill_2, none）'
        required: false
        default: ''
        type: choice
        options:
        - ''
        - 'a_add'
        - 'a_sell'
        - 'us_sell'
        - 'us_backfill_1'
        - 'us_backfill_2'
        - 'none'

jobs:
  run-strategy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create environment file
      run: |
        mkdir -p data
        echo "EMAIL_SENDER=${{ secrets.EMAIL_SENDER }}" > .env
        echo "EMAIL_PASSWORD=${{ secrets.EMAIL_PASSWORD }}" >> .env
        echo "EMAIL_RECEIVER=${{ secrets.EMAIL_RECEIVER }}" >> .env
        echo "SMTP_SERVER=${{ secrets.SMTP_SERVER }}" >> .env
        echo "SMTP_PORT=${{ secrets.SMTP_PORT }}" >> .env
        echo "EMAIL_DRY_RUN=0" >> .env

    - name: Run strategy
      run: |
        if [ -z "${{ inputs.simulate }}" ]; then
          python main.py
        else
          python main.py --simulate ${{ inputs.simulate }}
        fi

    - name: Save operation history
      uses: actions/upload-artifact@v4
      with:
        name: operation-history
        path: data/
